version: 2
updates:
  # Python dependencies (pyproject.toml, incl. dev/api/openai/live extras)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
